name: Test Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-scaffolding:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # NOTE: the baml-py pin in install_cmd must match the `version` in the
        # templates' baml_src/generators.baml — BAML enforces a major/minor match.
        include:
          - variant: "fastapi"
            flags: "--fastapi"
            scope: "fullstack"
            install_cmd: "pip install baml-py==0.223.0"
            baml_cmd: "baml-cli generate"
          - variant: "nestjs"
            flags: "--nestjs"
            scope: "fullstack"
            install_cmd: "npm install --prefix /tmp/test-project/api"
            baml_cmd: "npx baml-cli generate"
          - variant: "fastapi-entra"
            flags: "--fastapi --auth entra"
            scope: "fullstack"
            install_cmd: "pip install baml-py==0.223.0"
            baml_cmd: "baml-cli generate"
          - variant: "nestjs-entra"
            flags: "--nestjs --auth entra"
            scope: "fullstack"
            install_cmd: "npm install --prefix /tmp/test-project/api"
            baml_cmd: "npx baml-cli generate"
          - variant: "fastapi-api"
            flags: "--fastapi --scope api"
            scope: "api"
            install_cmd: "pip install baml-py==0.223.0"
            baml_cmd: "baml-cli generate"
          - variant: "nestjs-api"
            flags: "--nestjs --scope api"
            scope: "api"
            install_cmd: "npm install --prefix /tmp/test-project/api"
            baml_cmd: "npx baml-cli generate"
          - variant: "frontend"
            flags: "--scope frontend"
            scope: "frontend"

    name: Test ${{ matrix.variant }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project-initializer package
        run: pip install -e .

      - name: Create test project
        run: |
          mkdir -p /tmp/test-project
          project-initializer /tmp/test-project ${{ matrix.flags }} --force

      - name: Install frontend dependencies
        if: matrix.scope != 'api'
        working-directory: /tmp/test-project/frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build Angular frontend
        if: matrix.scope != 'api'
        working-directory: /tmp/test-project/frontend
        run: npm run build

      - name: Install API dependencies
        if: matrix.scope != 'frontend'
        run: ${{ matrix.install_cmd }}

      - name: Generate BAML client
        if: matrix.scope != 'frontend'
        working-directory: /tmp/test-project/api
        run: ${{ matrix.baml_cmd }}

      - name: Start Docker services
        working-directory: /tmp/test-project
        run: docker compose up -d --build

      - name: Wait for API to be healthy
        if: matrix.scope != 'frontend'
        working-directory: /tmp/test-project
        run: |
          echo "Waiting for API to start..."
          sleep 30

          echo "Checking database health..."
          docker compose ps db 2>/dev/null | grep -q "healthy" || echo "DB service not present or not healthy (expected for some variants)"

          echo "Checking API health..."
          for i in {1..10}; do
            if curl -s http://localhost:8000/health > /dev/null 2>&1 || curl -s http://localhost:8000/docs > /dev/null 2>&1; then
              echo "API is responding"
              break
            fi
            echo "Waiting for API... (attempt $i)"
            sleep 5
          done

      - name: Wait for frontend to be healthy
        if: matrix.scope != 'api'
        working-directory: /tmp/test-project
        run: |
          echo "Waiting for frontend to start..."
          sleep 10

          echo "Checking frontend health..."
          for i in {1..10}; do
            if curl -s http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend is responding"
              break
            fi
            echo "Waiting for frontend... (attempt $i)"
            sleep 5
          done

      - name: Show container status
        working-directory: /tmp/test-project
        run: docker compose ps

      - name: Verify API endpoint
        if: matrix.scope != 'frontend'
        working-directory: /tmp/test-project
        run: |
          echo "=== Testing API /health endpoint ==="
          curl -v http://localhost:8000/health || (echo "API /health not accessible" && docker compose logs api && exit 1)

      - name: Verify frontend
        if: matrix.scope != 'api'
        working-directory: /tmp/test-project
        run: |
          echo "=== Testing Frontend ==="
          curl -s -o /dev/null -w "%{http_code}" http://localhost:4200 | grep -q "200" || (echo "Frontend not accessible" && docker compose logs frontend && exit 1)

      - name: Show logs on failure
        if: failure()
        working-directory: /tmp/test-project
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose logs

      - name: Cleanup
        if: always()
        working-directory: /tmp/test-project
        run: docker compose down -v
