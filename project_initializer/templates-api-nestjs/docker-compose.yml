services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: app_db
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis (BullMQ queue backend)
  redis:
    image: redis:7-alpine
    container_name: app_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # NestJS Backend with hot reload
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    container_name: app_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # env_file feeds the container the whole root .env (NODE_ENV, PORT,
    # LOG_LEVEL, CORS_ORIGINS, LLM/BAML keys, ...). The environment: block is
    # applied AFTER env_file and overrides ONLY the values that must point at
    # compose-network hosts (db, redis) instead of the localhost values the app
    # uses outside Docker. Everything else must come from .env, not be hardcoded.
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/app_db?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@db:5432/app_db?schema=public"
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - app_network
    command: npm run start:dev
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/api/v1/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Angular Frontend with nginx and API proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:80"
    networks:
      - app_network

  # Database Admin UI
  adminer:
    image: adminer:latest
    container_name: app_adminer
    restart: always
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
