services:
  # Redis (BullMQ queue backend)
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # NestJS Backend (connects to hosted Supabase DB)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - app_network
    command: npm run start:dev
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/api/v1/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Angular Frontend with nginx and API proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:80"
    networks:
      - app_network

networks:
  app_network:
