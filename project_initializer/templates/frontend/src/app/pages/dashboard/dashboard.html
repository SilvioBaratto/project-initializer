<div class="mx-auto max-w-5xl space-y-6 animate-fade-in-up">
  <div>
    <h1 class="text-2xl font-display font-semibold tracking-tight text-text">Dashboard</h1>
    <p class="mt-1 text-sm text-text-secondary">An overview of your key metrics.</p>
  </div>

  <!-- Metric grid -->
  <section class="grid grid-cols-2 gap-4 lg:grid-cols-4">
    @for (metric of metrics; track metric.label) {
      <div class="rounded-2xl border border-border bg-surface-raised p-5">
        <p class="text-sm text-text-secondary">{{ metric.label }}</p>
        <p class="mt-2 text-3xl font-display font-semibold text-text">{{ metric.value }}</p>
        <p class="mt-1 text-xs text-text-tertiary">{{ metric.hint }}</p>
      </div>
    }
  </section>

  <!-- Loading skeleton example -->
  <section class="rounded-2xl border border-border bg-surface-raised p-5">
    <p class="text-sm text-text-secondary mb-4">Loading example</p>
    <div class="space-y-3">
      <div class="h-4 w-2/3 rounded-md animate-shimmer"></div>
      <div class="h-4 w-1/2 rounded-md animate-shimmer"></div>
      <div class="h-4 w-3/4 rounded-md animate-shimmer"></div>
    </div>
  </section>
</div>
