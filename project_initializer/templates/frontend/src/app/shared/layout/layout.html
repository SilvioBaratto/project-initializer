<div class="h-dvh overflow-hidden flex flex-col md:block bg-surface">
  <!-- Skip link (target: #main-content) -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Mobile header -->
  <header class="md:hidden flex items-center justify-between h-14 px-4 border-b border-border bg-surface-raised shrink-0">
    <button (click)="toggleSidebar()" class="p-1.5 rounded-md text-text-secondary hover:text-text hover:bg-surface-inset transition-colors" aria-label="Open menu">
      <lucide-icon name="Menu" class="w-5 h-5" aria-hidden="true" />
    </button>
    <span class="text-base font-display font-semibold tracking-tight text-text">Acme</span>
    <div class="w-8"></div>
  </header>

  <!-- Mobile drawer overlay -->
  @if (showOverlay()) {
    <div class="fixed inset-0 bg-black/20 z-40 md:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <app-sidebar [isOpen]="isSidebarOpen()" [isMobile]="isMobile()" (closeSidebar)="closeSidebar()"></app-sidebar>

  <!-- Main content -->
  <main id="main-content" tabindex="-1" aria-label="Main content"
        class="md:pl-64 flex-1 min-h-0 overflow-y-auto md:h-dvh flex flex-col">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile bottom navigation -->
  <app-bottom-tab-bar class="md:hidden shrink-0" />

  <!-- aria-live route announcer (screen-reader only) -->
  <div aria-live="polite" aria-atomic="true" class="sr-only">{{ announced() }}</div>

  <!-- Toast outlet — inert placeholder, intentionally unwired (no ToastService this cycle) -->
  <div id="toast-outlet" aria-live="polite" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>
</div>
