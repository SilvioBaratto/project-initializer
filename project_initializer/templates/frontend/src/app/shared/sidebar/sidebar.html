<app-drawer [side]="'left'" [open]="showSidebar()" drawerId="sidebar-drawer" [trapFocus]="isMobile()" (close)="closeSidebar.emit()">

  <!-- Brand (desktop) -->
  <div class="hidden md:flex items-center h-14 px-5 border-b border-border">
    <span class="text-base font-display font-semibold tracking-tight text-text">Acme</span>
  </div>

  <!-- Brand + mobile close -->
  <div class="flex items-center justify-between h-14 px-4 border-b border-border md:hidden">
    <span class="text-base font-display font-semibold tracking-tight text-text">Acme</span>
    <button (click)="closeSidebar.emit()" class="p-1.5 rounded-md text-text-secondary hover:text-text hover:bg-surface-inset transition-colors" aria-label="Close menu">
      <lucide-icon name="X" class="w-4 h-4" aria-hidden="true" />
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-3">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="bg-primary-light text-primary font-medium"
         ariaCurrentWhenActive="page"
         [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
         class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm text-text-secondary hover:text-text hover:bg-surface-inset transition-colors mb-0.5"
         (click)="onNavClick()">
        <lucide-icon [name]="item.icon" class="w-4 h-4 shrink-0" aria-hidden="true" />
        <span>{{ item.name }}</span>
      </a>
    }
  </nav>

  <!-- Footer -->
  <footer class="mt-auto flex flex-col gap-1 border-t border-border p-3">
    <button (click)="toggleTheme()" aria-label="Toggle theme"
            class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm text-text-secondary hover:text-text hover:bg-surface-inset transition-colors">
      @switch (theme()) {
        @case ('light') { <lucide-icon name="Sun" class="w-4 h-4 shrink-0" aria-hidden="true" /> }
        @case ('dark') { <lucide-icon name="Moon" class="w-4 h-4 shrink-0" aria-hidden="true" /> }
        @default { <lucide-icon name="Monitor" class="w-4 h-4 shrink-0" aria-hidden="true" /> }
      }
      <span class="capitalize">{{ theme() }}</span>
    </button>

    <div class="flex items-center justify-between gap-2.5 px-2.5 py-1.5">
      <div class="flex items-center gap-2.5 min-w-0">
        <lucide-icon name="User" class="w-4 h-4 shrink-0 text-text-secondary" aria-hidden="true" />
        <span class="text-sm text-text truncate">User</span>
      </div>
      <button aria-label="Log out"
              class="p-1.5 rounded-md text-text-secondary hover:text-text hover:bg-surface-inset transition-colors">
        <lucide-icon name="LogOut" class="w-4 h-4" aria-hidden="true" />
      </button>
    </div>
  </footer>

</app-drawer>
